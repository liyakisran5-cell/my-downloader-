<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VidSnatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#08090a;--card:#111214;--border:#1e2025;--accent:#c8f03e;--accent2:#3ef0c8;--red:#ff4d6d;--text:#e8eaf0;--muted:#6b7280}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:40px 16px;
      background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(200,240,62,0.07) 0%,transparent 70%),
      radial-gradient(ellipse 40% 30% at 90% 80%,rgba(62,240,200,0.05) 0%,transparent 60%)}
    .wrapper{max-width:660px;margin:0 auto}
    .header{text-align:center;margin-bottom:40px}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.2rem,8vw,3.8rem);letter-spacing:-2px;line-height:1}
    .logo span{color:var(--accent)}
    .tagline{color:var(--muted);font-size:0.72rem;margin-top:8px;letter-spacing:2px;text-transform:uppercase}
    .badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:16px}
    .badge{font-size:0.62rem;padding:3px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);letter-spacing:1px}
    .badge.yt{border-color:#ff4444;color:#ff4444}.badge.ig{border-color:#e1306c;color:#e1306c}
    .badge.tt{border-color:#69c9d0;color:#69c9d0}.badge.fb{border-color:#1877f2;color:#1877f2}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px}
    .input-row{display:flex;gap:10px}
    .url-input{flex:1;padding:13px 15px;border-radius:11px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;outline:none;transition:border-color 0.2s}
    .url-input:focus{border-color:var(--accent)}
    .url-input::placeholder{color:var(--muted)}
    .btn-fetch{background:var(--accent);color:#08090a;font-family:'Syne',sans-serif;font-weight:800;font-size:0.82rem;padding:13px 22px;border:none;border-radius:11px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
    .btn-fetch:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,240,62,0.3)}
    .btn-fetch:disabled{opacity:0.55;cursor:not-allowed;transform:none}
