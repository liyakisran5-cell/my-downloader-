<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="referrer" content="no-referrer">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VidSnatch – Social Video Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08090a;
      --card: #111214;
      --border: #1e2025;
      --accent: #c8f03e;
      --accent2: #3ef0c8;
      --red: #ff4d6d;
      --text: #e8eaf0;
      --muted: #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 48px 16px;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(200,240,62,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(62,240,200,0.05) 0%, transparent 60%);
    }

    .wrapper { max-width: 680px; margin: 0 auto; }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 48px; }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: -2px;
      line-height: 1;
    }
    .logo span { color: var(--accent); }
    .tagline { color: var(--muted); font-size: 0.75rem; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── BADGES ── */
    .badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .badge {
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 1px;
    }
    .badge.yt  { border-color: #ff4444; color: #ff4444; }
    .badge.ig  { border-color: #e1306c; color: #e1306c; }
    .badge.tt  { border-color: #69c9d0; color: #69c9d0; }
    .badge.fb  { border-color: #1877f2; color: #1877f2; }
    .badge.tw  { border-color: #1da1f2; color: #1da1f2; }
    .badge.more{ border-color: var(--accent); color: var(--accent); }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    /* ── INPUT ROW ── */
    .input-row { display: flex; gap: 12px; }
    .url-input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }

    .btn-fetch {
      background: var(--accent);
      color: #08090a;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-fetch:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,240,62,0.35); }
    .btn-fetch:active { transform: translateY(0); }
    .btn-fetch:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── PASTE HELPER ── */
    .paste-btn {
      margin-top: 10px;
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .paste-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── PROGRESS ── */
    .progress-bar-wrap {
      margin-top: 16px;
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
      display: none;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      animation: indeterminate 1.4s infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%) scaleX(0.5); }
      50%  { transform: translateX(0%)    scaleX(0.8); }
      100% { transform: translateX(100%)  scaleX(0.5); }
    }

    .status-text {
      margin-top: 10px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      display: none;
    }

    /* ── RESULT ── */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .result-thumb-wrap { position: relative; }
    .result-thumb {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #1a1b1d;
    }
    .thumb-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(transparent, var(--card));
    }
    .play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      backdrop-filter: blur(4px);
    }

    .result-body { padding: 20px 24px 24px; }
    .result-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.4;
      margin-bottom: 6px;
      color: var(--text);
    }
    .result-meta { font-size: 0.68rem; color: var(--muted); margin-bottom: 20px; }

    .formats-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .dl-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--accent2);
      font-size: 0.78rem;
      transition: all 0.2s;
    }
    .dl-link:hover { background: rgba(62,240,200,0.07); border-color: var(--accent2); transform: translateX(4px); }
    .dl-link .left { display: flex; align-items: center; gap: 10px; }
    .dl-link .icon { font-size: 1.1rem; }
    .dl-link .info { display: flex; flex-direction: column; }
    .dl-link .quality { font-weight: 500; color: var(--text); }
    .dl-link .size { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
    .dl-arrow { font-size: 1rem; opacity: 0.5; }

    .no-links {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ── ERROR ── */
    .error-box {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.3);
      color: var(--red);
      font-size: 0.78rem;
      text-align: center;
      display: none;
      animation: fadeUp 0.2s ease;
    }

    /* ── HISTORY ── */
    .history-section { margin-top: 32px; }
    .history-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      opacity: 0.7;
    }
    .clear-btn:hover { opacity: 1; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .history-item:hover { border-color: var(--accent); }
    .history-item .h-icon { font-size: 1.1rem; flex-shrink: 0; }
    .history-item .h-url {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* ── LOADER SPINNER ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(8,9,10,0.3);
      border-top-color: #08090a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .btn-fetch { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Vid<span>Snatch</span></div>
    <div class="tagline">Download Any Video · Anywhere</div>
    <div class="badges">
      <span class="badge yt">YouTube</span>
      <span class="badge ig">Instagram</span>
      <span class="badge tt">TikTok</span>
      <span class="badge fb">Facebook</span>
      <span class="badge tw">Twitter/X</span>
      <span class="badge more">+More</span>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="input-row">
      <input
        id="urlInput"
        type="url"
        class="url-input"
        placeholder="Paste video link here..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="fetchBtn" class="btn-fetch" onclick="handleFetch()">
        <span id="btnContent">FETCH</span>
      </button>
    </div>
    <button class="paste-btn" onclick="pasteFromClipboard()">📋 Paste from Clipboard</button>
    <div class="progress-bar-wrap" id="progressBar">
      <div class="progress-bar-fill"></div>
    </div>
    <div class="status-text" id="statusText">Fetching video info...</div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- RESULT -->
  <div class="result-card" id="resultCard">
    <div class="result-thumb-wrap">
      <img id="resultThumb" class="result-thumb" src="" alt="Thumbnail" onerror="this.style.display='none'" />
      <div class="thumb-overlay"></div>
      <div class="play-icon">▶</div>
    </div>
    <div class="result-body">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-meta" id="resultMeta"></div>
      <div class="formats-label">Available Formats</div>
      <div id="linksContainer"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-label">
      <span>Recent Links</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div id="historyList"></div>
  </div>

  <div class="footer">VidSnatch · For personal use only · Respect copyright laws</div>

</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  var API_KEY = "8573c3a5a4msh17b0edce5836123p15a406jsnf2cf5e558202";
  var history_key = "vidsnatch_history";

  // ─── CLIPBOARD PASTE ──────────────────────────────────────────────────────
  function pasteFromClipboard() {
    if (navigator.clipboard && navigator.clipboard.readText) {
      navigator.clipboard.readText().then(function(text) {
        document.getElementById("urlInput").value = text.trim();
      }).catch(function() {
        document.getElementById("urlInput").focus();
      });
    } else {
      document.getElementById("urlInput").focus();
    }
  }

  // ─── DETECT PLATFORM ──────────────────────────────────────────────────────
  function detectPlatform(url) {
    if (url.includes("youtube.com") || url.includes("youtu.be") || url.includes("shorts")) {
      return "youtube";
    }
    if (url.includes("instagram.com")) { return "instagram"; }
    if (url.includes("tiktok.com"))    { return "tiktok";    }
    if (url.includes("facebook.com") || url.includes("fb.watch")) { return "facebook"; }
    if (url.includes("twitter.com") || url.includes("x.com"))     { return "twitter";  }
    return "other";
  }

  // ─── UI HELPERS ────────────────────────────────────────────────────────────
  function setLoading(on) {
    var btn  = document.getElementById("fetchBtn");
    var bc   = document.getElementById("btnContent");
    var pb   = document.getElementById("progressBar");
    var st   = document.getElementById("statusText");
    btn.disabled = on;
    bc.innerHTML  = on ? '<div class="spinner"></div>' : "FETCH";
    pb.style.display = on ? "block" : "none";
    st.style.display = on ? "block" : "none";
  }

  function showError(msg) {
    var box = document.getElementById("errorBox");
    box.textContent = "⚠ " + msg;
    box.style.display = "block";
  }

  function hideError() {
    document.getElementById("errorBox").style.display = "none";
  }

  function hideResult() {
    document.getElementById("resultCard").style.display = "none";
  }

  // ─── FORMAT QUALITY LABEL ─────────────────────────────────────────────────
  function qualityLabel(item) {
    if (item.quality)   { return item.quality; }
    if (item.extension) { return item.extension.toUpperCase(); }
    if (item.type)      { return item.type; }
    return "Download";
  }

  function sizeLabel(item) {
    if (item.size)     { return item.size; }
    if (item.filesize) { return Math.round(item.filesize / 1048576) + " MB"; }
    return "";
  }

  // ─── RENDER RESULT ─────────────────────────────────────────────────────────
  function renderResult(title, thumb, duration, medias) {
    document.getElementById("resultTitle").textContent = title || "Video Found";
    document.getElementById("resultThumb").src = thumb || "";
    document.getElementById("resultMeta").textContent = duration ? "Duration: " + duration : "";

    var container = document.getElementById("linksContainer");
    container.innerHTML = "";

    if (!medias || medias.length === 0) {
      container.innerHTML = '<div class="no-links">No downloadable formats found.<br>Try a different link.</div>';
      document.getElementById("resultCard").style.display = "block";
      return;
    }

    medias.forEach(function(m) {
      var url = m.url || m.downloadUrl || m.link || "";
      if (!url) { return; }

      var a = document.createElement("a");
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "dl-link";

      var q  = qualityLabel(m);
      var sz = sizeLabel(m);

      a.innerHTML =
        '<div class="left">' +
          '<span class="icon">⬇</span>' +
          '<span class="info">' +
            '<span class="quality">' + q + '</span>' +
            (sz ? '<span class="size">' + sz + '</span>' : '') +
          '</span>' +
        '</div>' +
        '<span class="dl-arrow">→</span>';

      container.appendChild(a);
    });

    document.getElementById("resultCard").style.display = "block";
  }

  // ─── HISTORY ───────────────────────────────────────────────────────────────
  function loadHistory() {
    try {
      return JSON.parse(localStorage.getItem(history_key)) || [];
    } catch (e) {
      return [];
    }
  }

  function saveHistory(url) {
    var h = loadHistory().filter(function(u) { return u !== url; });
    h.unshift(url);
    if (h.length > 8) { h = h.slice(0, 8); }
    try { localStorage.setItem(history_key, JSON.stringify(h)); } catch(e) {}
    renderHistory();
  }

  function clearHistory() {
    try { localStorage.removeItem(history_key); } catch(e) {}
    renderHistory();
  }

  function renderHistory() {
    var h   = loadHistory();
    var sec = document.getElementById("historySection");
    var lst = document.getElementById("historyList");

    if (h.length === 0) {
      sec.style.display = "none";
      return;
    }

    sec.style.display = "block";
    lst.innerHTML = "";
    h.forEach(function(url) {
      var div = document.createElement("div");
      div.className = "history-item";

      var plat = detectPlatform(url);
      var icons = { youtube:"▶", instagram:"📸", tiktok:"🎵", facebook:"👤", twitter:"🐦", other:"🔗" };
      var icon = icons[plat] || "🔗";

      div.innerHTML =
        '<span class="h-icon">' + icon + '</span>' +
        '<span class="h-url">' + url + '</span>';

      div.onclick = function() {
        document.getElementById("urlInput").value = url;
        handleFetch();
      };

      lst.appendChild(div);
    });
  }

  // ─── MAIN FETCH ────────────────────────────────────────────────────────────
  async function handleFetch() {
    var rawUrl = document.getElementById("urlInput").value.trim();
    if (!rawUrl) {
      showError("Please paste a video link first!");
      return;
    }

    // Basic URL check
    if (!rawUrl.startsWith("http")) {
      showError("Please enter a valid URL starting with http or https");
      return;
    }

    hideError();
    hideResult();
    setLoading(true);

    var platform = detectPlatform(rawUrl);

    try {
      if (platform === "youtube") {
        await fetchYouTube(rawUrl);
      } else {
        await fetchGeneral(rawUrl);
      }
      saveHistory(rawUrl);
    } catch (err) {
      showError(err.message || "Something went wrong. Please try again.");
    } finally {
      setLoading(false);
    }
  }

  // ─── YOUTUBE API ───────────────────────────────────────────────────────────
  async function fetchYouTube(url) {
    var endpoint = "https://youtube-media-downloader.p.rapidapi.com/v2/video/details?url=" + encodeURIComponent(url);

    var res = await fetch(endpoint, {
      method: "GET",
      headers: {
        "x-rapidapi-key": API_KEY,
        "x-rapidapi-host": "youtube-media-downloader.p.rapidapi.com"
      }
    });

    if (!res.ok) {
      var errData = {};
      try { errData = await res.json(); } catch(e) {}
      throw new Error(errData.message || "YouTube API error (" + res.status + ")");
    }

    var data = await res.json();

    if (!data || data.status === false) {
      throw new Error(data.errorId || "Could not fetch YouTube video.");
    }

    var title    = data.title || "YouTube Video";
    var thumb    = "";
    var duration = data.lengthSeconds ? formatDuration(parseInt(data.lengthSeconds)) : "";

    // Thumbnail
    if (data.thumbnails && data.thumbnails.length > 0) {
      thumb = data.thumbnails[data.thumbnails.length - 1].url || data.thumbnails[0].url;
    }

    // Videos
    var medias = [];
    var videos = (data.videos && data.videos.items) ? data.videos.items : [];
    videos.forEach(function(v) {
      if (v.url) {
        medias.push({
          url:     v.url,
          quality: (v.height ? v.height + "p" : "") + (v.extension ? " · " + v.extension.toUpperCase() : ""),
          size:    v.sizeText || ""
        });
      }
    });

    // Audios
    var audios = (data.audios && data.audios.items) ? data.audios.items : [];
    audios.forEach(function(a) {
      if (a.url) {
        medias.push({
          url:     a.url,
          quality: "Audio · " + (a.extension ? a.extension.toUpperCase() : "MP3"),
          size:    a.sizeText || ""
        });
      }
    });

    if (medias.length === 0) {
      throw new Error("No downloadable formats found for this YouTube video.");
    }

    renderResult(title, thumb, duration, medias);
  }

  // ─── GENERAL / SOCIAL API ──────────────────────────────────────────────────
  async function fetchGeneral(url) {
    var res = await fetch("https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink", {
      method: "POST",
      headers: {
        "x-rapidapi-key":  API_KEY,
        "x-rapidapi-host": "social-download-all-in-one.p.rapidapi.com",
        "content-type":    "application/json"
      },
      body: JSON.stringify({ url: url })
    });

    if (!res.ok) {
      var errData = {};
      try { errData = await res.json(); } catch(e) {}
      throw new Error(errData.message || "API error (" + res.status + ")");
    }

    var data = await res.json();

    if (!data) {
      throw new Error("Empty response from server.");
    }

    var title    = data.title || data.text || "Video Found";
    var thumb    = data.thumbnail || data.picture || data.cover || "";
    var duration = data.duration ? formatDuration(parseInt(data.duration)) : "";
    var medias   = [];

    // medias array
    if (data.medias && Array.isArray(data.medias)) {
      data.medias.forEach(function(m) {
        if (m.url) {
          medias.push({
            url:     m.url,
            quality: m.quality || m.type || "Download",
            size:    m.size || ""
          });
        }
      });
    }

    // links array fallback
    if (medias.length === 0 && data.links && Array.isArray(data.links)) {
      data.links.forEach(function(l) {
        var u = l.url || l.downloadUrl || l;
        if (typeof u === "string" && u.startsWith("http")) {
          medias.push({
            url:     u,
            quality: l.quality || "Download",
            size:    l.size || ""
          });
        }
      });
    }

    // url fallback
    if (medias.length === 0 && data.url) {
      medias.push({ url: data.url, quality: "Download Video", size: "" });
    }

    if (medias.length === 0) {
      throw new Error("No downloadable links found. This platform may not be supported.");
    }

    renderResult(title, thumb, duration, medias);
  }

  // ─── DURATION FORMAT ───────────────────────────────────────────────────────
  function formatDuration(secs) {
    if (!secs || isNaN(secs)) { return ""; }
    var h = Math.floor(secs / 3600);
    var m = Math.floor((secs % 3600) / 60);
    var s = secs % 60;
    if (h > 0) {
      return h + ":" + pad(m) + ":" + pad(s);
    }
    return m + ":" + pad(s);
  }

  function pad(n) {
    return n < 10 ? "0" + n : "" + n;
  }

  // ─── ENTER KEY ─────────────────────────────────────────────────────────────
  document.getElementById("urlInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { handleFetch(); }
  });

  // ─── AUTO-CLEAR ERROR ON INPUT ─────────────────────────────────────────────
  document.getElementById("urlInput").addEventListener("input", function() {
    hideError();
  });

  // ─── INIT ──────────────────────────────────────────────────────────────────
  renderHistory();
</script>

</body>
</html>
