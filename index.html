<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VidSnatch</title>
  <link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c8f03e"/>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#08090a;--card:#111214;--border:#1e2025;--accent:#c8f03e;--accent2:#3ef0c8;--red:#ff4d6d;--text:#e8eaf0;--muted:#6b7280}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:40px 16px;
      background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(200,240,62,0.07) 0%,transparent 70%),
      radial-gradient(ellipse 40% 30% at 90% 80%,rgba(62,240,200,0.05) 0%,transparent 60%)}
    .wrapper{max-width:660px;margin:0 auto}
    .header{text-align:center;margin-bottom:40px}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.2rem,8vw,3.8rem);letter-spacing:-2px;line-height:1}
    .logo span{color:var(--accent)}
    .tagline{color:var(--muted);font-size:0.72rem;margin-top:8px;letter-spacing:2px;text-transform:uppercase}
    .badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:16px}
    .badge{font-size:0.62rem;padding:3px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);letter-spacing:1px}
    .badge.yt{border-color:#ff4444;color:#ff4444}.badge.ig{border-color:#e1306c;color:#e1306c}
    .badge.tt{border-color:#69c9d0;color:#69c9d0}.badge.fb{border-color:#1877f2;color:#1877f2}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px}
    .input-row{display:flex;gap:10px}
    .url-input{flex:1;padding:13px 15px;border-radius:11px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;outline:none;transition:border-color 0.2s}
    .url-input:focus{border-color:var(--accent)}
    .url-input::placeholder{color:var(--muted)}
    .btn-fetch{background:var(--accent);color:#08090a;font-family:'Syne',sans-serif;font-weight:800;font-size:0.82rem;padding:13px 22px;border:none;border-radius:11px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
    .btn-fetch:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,240,62,0.3)}
    .btn-fetch:disabled{opacity:0.55;cursor:not-allowed;transform:none}
    .paste-btn{margin-top:9px;background:none;border:1px dashed var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.68rem;padding:5px 13px;border-radius:8px;cursor:pointer;transition:all 0.2s}
    .paste-btn:hover{border-color:var(--accent);color:var(--accent)}
    .prog-wrap{margin-top:14px;height:2px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden;display:none}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:ind 1.4s infinite}
    @keyframes ind{0%{transform:translateX(-100%) scaleX(.5)}50%{transform:translateX(0) scaleX(.8)}100%{transform:translateX(100%) scaleX(.5)}}
    .status{margin-top:9px;text-align:center;font-size:0.7rem;color:var(--muted);display:none}
    .error-box{margin-top:14px;padding:13px 16px;border-radius:11px;background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);color:var(--red);font-size:0.75rem;text-align:center;display:none}
    .result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:none;animation:fadeUp 0.3s ease;margin-top:4px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .thumb-wrap{position:relative}
    .thumb{width:100%;max-height:200px;object-fit:cover;display:block;background:#1a1b1d}
    .thumb-grad{position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(transparent,var(--card))}
    .result-body{padding:20px 22px 24px}
    .result-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;line-height:1.4;margin-bottom:5px}
    .result-meta{font-size:0.66rem;color:var(--muted);margin-bottom:20px}
    .formats-label{font-size:0.62rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
    .dl-btn{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;margin-bottom:8px;background:rgba(200,240,62,0.07);border:1px solid rgba(200,240,62,0.2);border-radius:11px;text-decoration:none;color:var(--accent);font-size:0.78rem;transition:all 0.2s}
    .dl-btn:hover{background:rgba(200,240,62,0.13);border-color:var(--accent);transform:translateX(3px)}
    .dl-btn .qlabel{font-weight:500;color:var(--text)}
    .dl-btn .qsub{font-size:0.62rem;color:var(--muted);margin-top:2px}
    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(8,9,10,0.25);border-top-color:#08090a;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;margin-top:44px;font-size:0.62rem;color:#2a2a2a;letter-spacing:1px}
    @media(max-width:480px){.input-row{flex-direction:column}.btn-fetch{width:100%;justify-content:center}}
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">Vid<span>Snatch</span></div>
    <div class="tagline">Download Any Video · Anywhere</div>
    <div class="badges">
      <span class="badge yt">YouTube</span>
      <span class="badge ig">Instagram</span>
      <span class="badge tt">TikTok</span>
      <span class="badge fb">Facebook</span>
    </div>
  </div>

  <div class="card">
    <div class="input-row">
      <input id="urlInput" type="url" class="url-input" placeholder="Video link yahan paste karo..." autocomplete="off" spellcheck="false"/>
      <button id="fetchBtn" class="btn-fetch" onclick="handleFetch()">
        <span id="btnContent">FETCH</span>
      </button>
    </div>
    <button class="paste-btn" onclick="pasteClip()">📋 Clipboard se Paste karo</button>
    <div class="prog-wrap" id="progWrap"><div class="prog-fill"></div></div>
    <div class="status" id="statusTxt">⏳ Video fetch ho rahi hai...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="thumb-wrap">
      <img id="rThumb" class="thumb" src="" alt="" onerror="this.style.display='none'"/>
      <div class="thumb-grad"></div>
    </div>
    <div class="result-body">
      <div class="result-title" id="rTitle"></div>
      <div class="result-meta" id="rMeta"></div>
      <div class="formats-label">Download Options</div>
      <div id="linksContainer"></div>
    </div>
  </div>

  <div class="footer">VidSnatch · Personal use only · © 2025</div>
</div>

<script>
  function pasteClip() {
    if (navigator.clipboard && navigator.clipboard.readText) {
      navigator.clipboard.readText().then(t => {
        document.getElementById("urlInput").value = t.trim();
      }).catch(() => document.getElementById("urlInput").focus());
    } else { document.getElementById("urlInput").focus(); }
  }

  function setLoading(on) {
    document.getElementById("fetchBtn").disabled = on;
    document.getElementById("btnContent").innerHTML = on ? '<div class="spinner"></div>' : "FETCH";
    document.getElementById("progWrap").style.display = on ? "block" : "none";
    document.getElementById("statusTxt").style.display = on ? "block" : "none";
  }

  function showError(msg) {
    var b = document.getElementById("errorBox");
    b.innerHTML = "⚠ " + msg;
    b.style.display = "block";
  }
  function hideError()  { document.getElementById("errorBox").style.display = "none"; }
  function hideResult() { document.getElementById("resultCard").style.display = "none"; }

  async function handleFetch() {
    var url = document.getElementById("urlInput").value.trim();
    if (!url || !url.startsWith("http")) {
      showError("Pehle ek valid video URL paste karo!");
      return;
    }
    hideError(); hideResult(); setLoading(true);
    try {
      // /api/proxy → Netlify function → batgpt API
      var res = await fetch("/api/proxy?url=" + encodeURIComponent(url));
      if (!res.ok) throw new Error("Server error: " + res.status);
      var data = await res.json();
      if (!data.success || !data.mediaInfo) throw new Error(data.message || "Video fetch nahi ho saka.");
      renderResult(data.mediaInfo);
    } catch (e) {
      showError(e.message || "Kuch gadbad ho gayi. Dobara try karo.");
    } finally {
      setLoading(false);
    }
  }

  function renderResult(info) {
    document.getElementById("rTitle").textContent = info.title || "Video";
    document.getElementById("rMeta").textContent =
      "Platform: " + (info.platform || "Unknown") +
      (info.duration ? "  ·  " + info.duration : "");

    var thumb = document.getElementById("rThumb");
    if (info.thumbnail) { thumb.src = info.thumbnail; thumb.style.display = "block"; }
    else { thumb.style.display = "none"; }

    var container = document.getElementById("linksContainer");
    container.innerHTML = "";
    var links = [];

    if (info.videoUrl) links.push({ url: info.videoUrl, label: "Video Download", icon: "🎬" });
    if (info.audioUrl) links.push({ url: info.audioUrl, label: "Audio Only (MP3)", icon: "🎵" });
    if (Array.isArray(info.links)) {
      info.links.forEach(function(l, i) {
        var u = l.url || l;
        if (typeof u === "string" && u.startsWith("http"))
          links.push({ url: u, label: l.quality || "Option " + (i+1), icon: "⬇" });
      });
    }

    if (links.length === 0) {
      container.innerHTML = '<div style="color:var(--muted);font-size:0.74rem;padding:8px 0">⚠ Koi download link nahi mila.</div>';
    } else {
      links.forEach(function(l) {
        var a = document.createElement("a");
        a.href = l.url; a.download = ""; a.target = "_blank"; a.rel = "noopener noreferrer";
        a.className = "dl-btn";
        a.innerHTML =
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<span style="font-size:1.2rem">' + l.icon + '</span>' +
            '<span><div class="qlabel">' + l.label + '</div></span>' +
          '</div><span style="opacity:0.6">↓</span>';
        container.appendChild(a);
      });
    }
    document.getElementById("resultCard").style.display = "block";
  }

  document.getElementById("urlInput").addEventListener("keydown", e => { if (e.key === "Enter") handleFetch(); });
  document.getElementById("urlInput").addEventListener("input", hideError);
</script>
</body>
</html>
